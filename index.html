<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faith's Debut Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{
 margin:0;
 font-family:'Poppins',sans-serif;
 background:linear-gradient(135deg,#5a0000,#8B0000);
 color:white;
 scroll-behavior:smooth;
}

section{
 min-height:100vh;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 padding:20px;
 opacity:0;
 transform:translateY(40px);
 transition:all 0.8s ease;
}

section.show{
 opacity:1;
 transform:translateY(0);
}

/* NEW ENVELOPE DESIGN */
.envelope{
 position:relative;
 width:250px;
 height:160px;
 background:#b22222;
 border-radius:10px;
 cursor:pointer;
 box-shadow:0 10px 25px rgba(0,0,0,0.5);
 overflow:hidden;
}

/* flap */
.envelope::before{
 content:"";
 position:absolute;
 top:0;
 left:0;
 width:0;
 height:0;
 border-left:125px solid transparent;
 border-right:125px solid transparent;
 border-top:80px solid #8B0000;
 transform-origin:top;
 transition:0.6s ease;
 z-index:2;
}

/* letter inside */
.letter{
 position:absolute;
 width:90%;
 height:90%;
 background:white;
 color:#8B0000;
 top:5%;
 left:5%;
 border-radius:8px;
 display:flex;
 justify-content:center;
 align-items:center;
 font-weight:bold;
 transform:translateY(60px);
 transition:0.6s ease;
 z-index:1;
}

.envelope.open::before{
 transform:rotateX(180deg);
}

.envelope.open .letter{
 transform:translateY(-10px);
}

.card{
 max-width:700px;
 width:100%;
 background:rgba(255,255,255,0.08);
 backdrop-filter:blur(10px);
 padding:25px;
 border-radius:20px;
 text-align:center;
}

h1{font-family:'Playfair Display',serif}

.list{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
 gap:10px;
 margin-top:15px;
}

.item{
 background:rgba(255,255,255,0.1);
 padding:10px;
 border-radius:10px;
}

.lightbox img{
 box-shadow:0 10px 40px rgba(0,0,0,0.8);
}

.gallery{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
 gap:10px;
}
.gallery img{
 width:100%;
 border-radius:10px;
 cursor:pointer;
 transition:0.3s;
}
.gallery img:hover{
 transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox{
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:rgba(0,0,0,0.9);
 display:none;
 justify-content:center;
 align-items:center;
 z-index:999;
}
.lightbox img{
 max-width:90%;
 max-height:90%;
 border-radius:10px;
}
.lightbox.show{
 display:flex;
}

iframe{
 width:100%;height:250px;border:none;border-radius:10px;
}

@media(max-width:600px){
 h1{font-size:24px}
}
</style>
</head>
<body>

<!-- Envelope -->
<section id="start" class="show">
<div class="envelope" onclick="openEnvelope(this)">
  <div class="letter">You're Invited 💌</div>
</div>
<p>Tap to open invitation</p>
</section>

<!-- Main Info -->
<section>
<div class="card">
<h1>Faith's Debut Celebration</h1>
<p>April 19, 2026 | 6:00 PM</p>
<p>Dress Code: Black | White | Semi-formal</p>
<div id="countdown"></div>
</div>
</section>

<!-- Gallery -->
<section>
<div class="card">
<h1>Gallery</h1>
<div class="gallery">
<img src="image1.jpg">
<img src="image2.jpg">
<img src="image3.jpg">
<img src="image4.jpg">
</div>
</div>
</section>

<!-- Location -->
<section>
<div class="card">
<h1>Location</h1>
<iframe src="https://maps.google.com/maps?q=The Emerald Isle PH&output=embed"></iframe>
</div>
</section>

<!-- 18 Roses -->
<section>
<div class="card">
<h1>🌹 18 Roses</h1>
<div class="list">
<div class="item">Gene</div>
<div class="item">Gene</div>
<div class="item">Gene</div>
</div>
</div>
</section>

<!-- 18 Candles -->
<section>
<div class="card">
<h1>🕯 18 Candles</h1>
<div class="list">
<div class="item">April</div>
<div class="item">April</div>
<div class="item">April</div>
</div>
</div>
</section>

<!-- 18 Gifts -->
<section>
<div class="card">
<h1>🎁 18 Gifts</h1>
<div class="list">
<div class="item">Gift 1</div>
<div class="item">Gift 2</div>
<div class="item">Gift 3</div>
</div>
</div>
</section>

<!-- 18 Blue Bills -->
<section>
<div class="card">
<h1>💙 18 Blue Bills</h1>
<div class="list">
<div class="item">Sponsor 1</div>
<div class="item">Sponsor 2</div>
<div class="item">Sponsor 3</div>
</div>
</div>
</section>

<script>
function openEnvelope(el){
 el.classList.add('open');
 setTimeout(()=>{
  window.scrollTo({top:window.innerHeight,behavior:'smooth'});
 },600);
}

// Scroll animation
const sections=document.querySelectorAll('section');
window.addEventListener('scroll',()=>{
 sections.forEach(sec=>{
  const top=sec.getBoundingClientRect().top;
  if(top<window.innerHeight-100){
   sec.classList.add('show');
  }
 });
});

// Lightbox
const images = document.querySelectorAll('.gallery img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');

images.forEach(img => {
 img.addEventListener('click', () => {
  lightbox.classList.add('show');
  lightboxImg.src = img.src;
 });
});

function closeLightbox(){
 lightbox.classList.remove('show');
}

// Countdown
const eventDate=new Date("April 19, 2026 18:00:00").getTime();
setInterval(()=>{
 const now=new Date().getTime();
 const diff=eventDate-now;
 const d=Math.floor(diff/(1000*60*60*24));
 const h=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
 const m=Math.floor((diff%(1000*60*60))/(1000*60));
 const s=Math.floor((diff%(1000*60))/1000);
 document.getElementById("countdown").innerHTML=`⏳ ${d}d ${h}h ${m}m ${s}s`;
},1000);
</script>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg">
</div>

</body>
</html>
